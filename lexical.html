<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexical Decision Task</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #task-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #word-display {
            font-size: 3rem;
            margin-bottom: 2rem;
            min-height: 4rem;
        }
        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn-yes { background-color: #4CAF50; color: white; }
        .btn-yes:hover { background-color: #45a049; }
        .btn-no { background-color: #f44336; color: white; }
        .btn-no:hover { background-color: #da190b; }
        #results {
            display: none;
            text-align: left;
            max-width: 600px;
            margin-top: 2rem;
        }
        .wrong-word { color: #d32f2f; }
        .correct-label { font-weight: bold; margin-left: 0.5rem; }
    </style>
</head>
<body>

    <div id="task-container">
        <div id="word-display">Press Start</div>
        <div class="buttons" id="button-container">
            <button id="start-btn">Start</button>
        </div>
        <div id="results">
            <h2>Results</h2>
            <p id="score-summary"></p>
            <div id="wrong-list"></div>
            <button onclick="location.reload()">Restart</button>
        </div>
    </div>

    <script>
        const words = [
            { word: "Telescope", isWord: true }, { word: "Orchard", isWord: true }, { word: "Syringe", isWord: true },
            { word: "Velvet", isWord: true }, { word: "Sculpture", isWord: true }, { word: "Boulder", isWord: true },
            { word: "Canvas", isWord: true }, { word: "Violin", isWord: true }, { word: "Anchor", isWord: true },
            { word: "Lantern", isWord: true }, { word: "Pendulum", isWord: true }, { word: "Dagger", isWord: true },
            { word: "Compass", isWord: true }, { word: "Fossil", isWord: true }, { word: "Meadow", isWord: true },
            { word: "Ambiguity", isWord: true }, { word: "Resilience", isWord: true }, { word: "Hypocrisy", isWord: true },
            { word: "Nostalgia", isWord: true }, { word: "Dilemma", isWord: true }, { word: "Autonomy", isWord: true },
            { word: "Paradigm", isWord: true }, { word: "Empathy", isWord: true }, { word: "Prejudice", isWord: true },
            { word: "Integrity", isWord: true }, { word: "Melancholy", isWord: true }, { word: "Cynicism", isWord: true },
            { word: "Epiphany", isWord: true }, { word: "Vengeance", isWord: true }, { word: "Solitude", isWord: true },
            { word: "Blicket", isWord: false }, { word: "Pramble", isWord: false }, { word: "Flirn", isWord: false },
            { word: "Glasty", isWord: false }, { word: "Trindal", isWord: false }, { word: "Vistion", isWord: false },
            { word: "Morpent", isWord: false }, { word: "Snarkle", isWord: false }, { word: "Frelm", isWord: false },
            { word: "Krovity", isWord: false }, { word: "Splent", isWord: false }, { word: "Churlik", isWord: false },
            { word: "Plonket", isWord: false }, { word: "Waburn", isWord: false }, { word: "Throsp", isWord: false },
            { word: "Clend", isWord: false }, { word: "Proction", isWord: false }, { word: "Skrindle", isWord: false },
            { word: "Frask", isWord: false }, { word: "Glornt", isWord: false }, { word: "Smeen", isWord: false },
            { word: "Blonst", isWord: false }, { word: "Dranit", isWord: false }, { word: "Crupt", isWord: false },
            { word: "Telsory", isWord: false }, { word: "Nunget", isWord: false }, { word: "Flist", isWord: false },
            { word: "Pralt", isWord: false }, { word: "Veldent", isWord: false }, { word: "Smant", isWord: false }
        ];

        let currentIndex = 0;
        let score = 0;
        let wrongAnswers = [];

        const wordDisplay = document.getElementById('word-display');
        const buttonContainer = document.getElementById('button-container');
        const resultsDiv = document.getElementById('results');
        const wrongListDiv = document.getElementById('wrong-list');
        const scoreSummary = document.getElementById('score-summary');

        document.getElementById('start-btn').addEventListener('click', startTask);

        function startTask() {
            // Shuffle words
            words.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            score = 0;
            wrongAnswers = [];
            showNextWord();
        }

        function showNextWord() {
            if (currentIndex < words.length) {
                wordDisplay.innerText = words[currentIndex].word;
                buttonContainer.innerHTML = `
                    <button class="btn-yes" onclick="handleAnswer(true)">1: YES</button>
                    <button class="btn-no" onclick="handleAnswer(false)">0: NO</button>
                `;
            } else {
                showResults();
            }
        }

        function handleAnswer(answer) {
            const currentItem = words[currentIndex];
            if (answer === currentItem.isWord) {
                score++;
            } else {
                wrongAnswers.push(currentItem);
            }
            currentIndex++;
            showNextWord();
        }

        function showResults() {
            wordDisplay.innerText = "Task Finished";
            buttonContainer.innerHTML = "";
            resultsDiv.style.display = "block";
            scoreSummary.innerText = `Skorunuz: ${score} doğru, ${words.length - score} yanlış.`;
            
            if (wrongAnswers.length > 0) {
                wrongListDiv.innerHTML = "<h3>Yanlış cevaplanan kelimeler:</h3>";
                wrongAnswers.forEach(item => {
                    const p = document.createElement('p');
                    p.className = 'wrong-word';
                    p.innerHTML = `${item.word} <span class="correct-label">(${item.isWord ? 'Word' : 'Non-word'})</span>`;
                    wrongListDiv.appendChild(p);
                });
            } else {
                wrongListDiv.innerHTML = "<p>Harika! Hiç hata yapmadınız.</p>";
            }
        }
    </script>
</body>
</html>
